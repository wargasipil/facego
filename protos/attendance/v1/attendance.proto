syntax = "proto3";

package attendance.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

service AttendanceService {
  // Submit a webcam frame; backend performs face recognition and records attendance.
  rpc RecordAttendance(RecordAttendanceRequest) returns (RecordAttendanceResponse);
  // Fetch all records for a given date (+ optional class filter).
  rpc GetDailyAttendance(GetDailyAttendanceRequest) returns (GetDailyAttendanceResponse);
  // Fetch historical records for a student or date range.
  rpc ListAttendance(ListAttendanceRequest) returns (ListAttendanceResponse);
  // Server-streaming: push a new AttendanceRecord every time a face is recognised.
  rpc WatchAttendance(WatchAttendanceRequest) returns (stream WatchAttendanceResponse);
  // Manually create an attendance record (operator/teacher).
  rpc CreateAttendance(CreateAttendanceRequest) returns (CreateAttendanceResponse);
  // Delete an attendance record.
  rpc DeleteAttendance(DeleteAttendanceRequest) returns (DeleteAttendanceResponse);
  // Push a raw face-detection event from the Python client; backend handles dedup + storage.
  rpc AttendancePushLog(AttendancePushLogRequest) returns (AttendancePushLogResponse);
}

enum AttendanceStatus {
  ATTENDANCE_STATUS_UNSPECIFIED = 0;
  ATTENDANCE_STATUS_PRESENT = 1;
  ATTENDANCE_STATUS_ABSENT = 2;
}

enum NotifyStatus {
  NOTIFY_STATUS_UNSPECIFIED = 0;
  NOTIFY_STATUS_PENDING = 1;
  NOTIFY_STATUS_NOTIFIED = 2;
}

message UserAttendance {
  int64 id = 1;
  string student_id = 2;
  string name = 3;
  string photo_url = 4;
  string parent_name = 5;
  string parent_phone = 6;
}

message AttendanceRecord {
  int64 id = 1;
  int64 user_id = 2;
  int64 class_id = 3;
  int64 class_schedule_id = 4;
  google.protobuf.Timestamp day = 5;
  AttendanceStatus status = 6;
  NotifyStatus notify_status = 7;
  google.protobuf.Timestamp check_in_time = 8;
  google.protobuf.Timestamp created_at = 9;
  UserAttendance student = 10;
}

message AttendanceSummary {
  int32 total = 1;
  int32 present = 2;
  int32 absent = 3;
}

// RecordAttendance ────────────────────────────────────────────────────────────
message RecordAttendanceRequest {
  bytes face_image = 1; // raw JPEG/PNG frame from webcam
}
message RecordAttendanceResponse {
  AttendanceRecord record = 1;
  bool matched = 2; // false if no registered face was recognised
}

// GetDailyAttendance ──────────────────────────────────────────────────────────
message GetDailyAttendanceFilter {
  int64 class_id = 1; // 0 = no filter
  int64 schedule_id = 2; // 0 = no filter
  google.protobuf.Timestamp date = 3; // nil = today
  string q = 4;
}
message GetDailyAttendanceRequest {
  GetDailyAttendanceFilter filter = 1;
  int32 page = 2 [(buf.validate.field).int32.gte = 0];
  int32 page_size = 3 [(buf.validate.field).int32 = {
    gte: 0
    lte: 200
  }];
}
message GetDailyAttendanceResponse {
  repeated AttendanceRecord records = 1;
  AttendanceSummary summary = 2;
  int32 total = 3;
}

// ListAttendance ──────────────────────────────────────────────────────────────
message ListAttendanceRequest {
  int64 user_id = 1; // optional; filter by student
  google.protobuf.Timestamp from = 2; // optional
  google.protobuf.Timestamp to = 3; // optional
}
message ListAttendanceResponse {
  repeated AttendanceRecord records = 1;
}

// WatchAttendance ─────────────────────────────────────────────────────────────
message WatchAttendanceRequest {}
message WatchAttendanceResponse {
  AttendanceRecord record = 1;
}

// CreateAttendance ────────────────────────────────────────────────────────────
message CreateAttendanceRequest {
  int64 user_id = 1 [(buf.validate.field).int64.gt = 0];
  AttendanceStatus status = 2 [(buf.validate.field).enum.defined_only = true];
  string notes = 3;
  google.protobuf.Timestamp check_in_time = 4; // optional, defaults to now
  int64 class_id = 5 [(buf.validate.field).int64.gte = 0]; // 0 = unspecified
  int64 class_schedule_id = 6 [(buf.validate.field).int64.gte = 0]; // 0 = unspecified
}
message CreateAttendanceResponse {
  AttendanceRecord record = 1;
}

// DeleteAttendance ────────────────────────────────────────────────────────────
message DeleteAttendanceRequest {
  int64 id = 1 [(buf.validate.field).int64.gt = 0];
}
message DeleteAttendanceResponse {}

// AttendancePushLog ───────────────────────────────────────────────────────────
// Raw face-detection event pushed from the Python client.
// Backend stores to ClickHouse detection_log and (if user_id > 0) deduplicates
// and upserts an Attendance row in PostgreSQL.
message AttendancePushLogRequest {
  string session_id = 1 [(buf.validate.field).string.min_len = 1]; // UUID for this detection session
  int64 user_id = 2 [(buf.validate.field).int64.gt = 0];
  string student_id = 3 [(buf.validate.field).string.min_len = 1]; // face DB person_id key
  string student_name = 4;
  int64 class_id = 5 [(buf.validate.field).int64.gt = 0];
  string class_name = 6;
  google.protobuf.Timestamp seen_at = 7 [(buf.validate.field).required = true]; // exact Python detection timestamp
}
message AttendancePushLogResponse {}
