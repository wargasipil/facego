syntax = "proto3";

package notifiers.v1;

import "buf/validate/validate.proto";
// import "google/protobuf/timestamp.proto";

service NotifierService {
  rpc NotifyParent(NotifyParentRequest) returns (NotifyParentResponse);
}

message NotifyMeta {
  int64 class_id = 1 [(buf.validate.field).int64.gt = 0];
  int64 class_schedule_id = 2 [(buf.validate.field).int64.gt = 0];
}

message NotifyAll {}
message NotifyStudent {
  int64 attendance_id = 1 [(buf.validate.field).int64.gt = 0];
  int64 student_id = 2 [(buf.validate.field).int64.gt = 0];
}

message NotifyStudents {
  repeated NotifyStudent student = 3 [(buf.validate.field).repeated = {
    min_items: 1
    max_items: 100
  }];
}

message NotifyParentRequest {
  NotifyMeta meta = 1 [(buf.validate.field).required = true];
  oneof type {
    option (buf.validate.oneof).required = true;
    NotifyAll all = 2;
    NotifyStudents students = 3;
  }
}

message NotifyParentResponse {}
