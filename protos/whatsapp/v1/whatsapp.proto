syntax = "proto3";

package whatsapp.v1;

import "buf/validate/validate.proto";
import "google/protobuf/timestamp.proto";

service WhatsappService {
  rpc Status(StatusRequest) returns (StatusResponse);
  rpc WStream(WStreamRequest) returns (stream WStreamResponse);
  // Send WhatsApp notifications to parents of late/absent students
  rpc SendAttendanceAlerts(SendAttendanceAlertsRequest) returns (SendAttendanceAlertsResponse);
  // Send a message to a phone number
  rpc SendMessage(SendMessageRequest) returns (SendMessageResponse);
  // Message history
  rpc ListMessages(ListMessagesRequest) returns (ListMessagesResponse);
  // Configuration (message templates)
  rpc GetConfig(GetConfigRequest) returns (GetConfigResponse);
  rpc SaveConfig(SaveConfigRequest) returns (SaveConfigResponse);
}

// ── Connection ────────────────────────────────────────────────────────────────

message WStreamRequest {}

message NeedLogin {
  string code = 1;
}

message WStreamResponse {
  oneof e {
    NeedLogin need_login = 1;
    bool sync_completed = 2;
  }
}

message StatusRequest {}
message StatusResponse {
  bool connected = 1;
  string phone_number = 2;
}

// ── Shared types ──────────────────────────────────────────────────────────────

message WhatsappMessage {
  int64 id = 1;
  int64 user_id = 2;
  string name = 3;
  string parent_name = 4;
  string phone = 5;
  string message = 6;
  string status = 7; // "pending", "sent", "failed"
  string error = 8;
  google.protobuf.Timestamp sent_at = 9;
}

message WhatsappConfig {
  bool enabled = 1;
  string late_message_template = 2;
  string absent_message_template = 3;
  string sender_name = 4;
}

// ── SendAttendanceAlerts ──────────────────────────────────────────────────────

message SendAttendanceAlertsRequest {
  google.protobuf.Timestamp date = 1;
  bool notify_late = 2;
  bool notify_absent = 3;
  string class_filter = 4; // optional
  repeated int64 user_ids = 5; // optional: if set, only notify these users
}
message SendAttendanceAlertsResponse {
  int32 queued = 1; // messages created (pending send)
  int32 skipped = 2; // no parent phone
  repeated WhatsappMessage messages = 3;
}

// ── SendMessage ───────────────────────────────────────────────────────────────

message SendMessageRequest {
  string phone = 1 [(buf.validate.field).string.min_len = 1];
  string message = 2 [(buf.validate.field).string.min_len = 1];
}
message SendMessageResponse {
  bool success = 1;
  string error = 2;
}

// ── ListMessages ──────────────────────────────────────────────────────────────

message ListMessagesRequest {
  google.protobuf.Timestamp from = 1;
  google.protobuf.Timestamp to = 2;
}
message ListMessagesResponse {
  repeated WhatsappMessage messages = 1;
}

// ── GetConfig / SaveConfig ────────────────────────────────────────────────────

message GetConfigRequest {}
message GetConfigResponse {
  WhatsappConfig config = 1;
}

message SaveConfigRequest {
  WhatsappConfig config = 1 [(buf.validate.field).required = true];
}
message SaveConfigResponse {
  WhatsappConfig config = 1;
}
