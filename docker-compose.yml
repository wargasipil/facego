services:

  # ── Database ────────────────────────────────────────────────────────────────
  db:
    image: pgvector/pgvector:pg17
    container_name: facego_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: facego
      POSTGRES_PASSWORD: facego_secret
      POSTGRES_DB: facego
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U facego"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── ClickHouse ───────────────────────────────────────────────────────────────
  clickhouse:
    image: clickhouse/clickhouse-server:24.12
    container_name: facego_clickhouse
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB:       facego
      CLICKHOUSE_USER:     facego
      CLICKHOUSE_PASSWORD: facego_secret
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native TCP interface
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD-SHELL", "clickhouse-client --user facego --password facego_secret --query 'SELECT 1'"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Backend (Go / ConnectRPC) ────────────────────────────────────────────────
  backend:
    image: kampretcode/attendance_backend_go:latest
    pull_policy: always
    container_name: facego_backend
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - uploads:/var/facego/uploads
    depends_on:
      db:
        condition: service_healthy
    # Run migrations before starting the server:
    #   docker compose run --rm backend facego-server automigrate

  # ── Frontend (React / Nginx) ─────────────────────────────────────────────────
  frontend:
    image: kampretcode/attendance_frontend:latest
    pull_policy: always
    container_name: facego_frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  uploads:
  clickhouse_data:
